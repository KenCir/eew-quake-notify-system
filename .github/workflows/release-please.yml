name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package-windows:
    name: Package Windows x64
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release binary
        run: cargo build --release

      - name: Prepare release package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.release-please.outputs.version }}"
          $packageName = "eew-quake-notify-system-$version-windows-x86_64"
          $packageDir = Join-Path "dist" $packageName
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $packageDir "scripts") | Out-Null

          Copy-Item -LiteralPath "target\release\eew-quake-notify-system.exe" -Destination $packageDir
          Copy-Item -LiteralPath "config.toml.example" -Destination $packageDir
          Copy-Item -LiteralPath "README.md" -Destination $packageDir
          Copy-Item -LiteralPath "TERMS.md" -Destination $packageDir
          Copy-Item -LiteralPath "PRIVACY.md" -Destination $packageDir
          Copy-Item -LiteralPath "scripts\install-task-scheduler.ps1" -Destination (Join-Path $packageDir "scripts")
          Copy-Item -LiteralPath "scripts\uninstall-task-scheduler.ps1" -Destination (Join-Path $packageDir "scripts")

          $forbidden = @(
            Join-Path $packageDir "config.toml",
            Join-Path $packageDir "state",
            Join-Path $packageDir "logs"
          )
          foreach ($path in $forbidden) {
            if (Test-Path -LiteralPath $path) {
              throw "Forbidden runtime file was included in release package: $path"
            }
          }

          $zipPath = Join-Path "dist" "$packageName.zip"
          Compress-Archive -Path (Join-Path $packageDir "*") -DestinationPath $zipPath -Force
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $zipPath
          "$($hash.Hash.ToLowerInvariant())  $packageName.zip" |
            Set-Content -LiteralPath "$zipPath.sha256" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: eew-quake-notify-system-${{ needs.release-please.outputs.version }}-windows-x86_64
          path: |
            dist/eew-quake-notify-system-${{ needs.release-please.outputs.version }}-windows-x86_64.zip
            dist/eew-quake-notify-system-${{ needs.release-please.outputs.version }}-windows-x86_64.zip.sha256
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" `
            "dist/eew-quake-notify-system-${{ needs.release-please.outputs.version }}-windows-x86_64.zip" `
            "dist/eew-quake-notify-system-${{ needs.release-please.outputs.version }}-windows-x86_64.zip.sha256" `
            --clobber
